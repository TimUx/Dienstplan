name: Build, Test and Release

on:
  workflow_dispatch:

jobs:
  build-python-windows-empty:
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Test Python modules
      run: |
        python -c "import importlib.metadata; print('OR-Tools:', importlib.metadata.version('ortools'))"
        python -c "import importlib.metadata; print('FastAPI:', importlib.metadata.version('fastapi'))"
        python -c "import importlib.metadata; print('Uvicorn:', importlib.metadata.version('uvicorn'))"
    
    - name: Get version
      id: version
      run: |
        $VERSION = "2.1.${{ github.run_number }}"
        echo "VERSION=$VERSION" >> $env:GITHUB_OUTPUT
        echo "Building version $VERSION (Production - Empty Database)"
    
    - name: Build Windows One-Dir distribution with PyInstaller
      run: |
        python -m PyInstaller Dienstplan.spec

    - name: Create distribution ZIP
      run: |
        $zip = "Dienstplan-Windows-v${{ steps.version.outputs.VERSION }}.zip"
        Compress-Archive -Path "dist\Dienstplan\*" -DestinationPath $zip -Force
        echo "ZIP_NAME=$zip" >> $env:GITHUB_OUTPUT
      id: zipstep

    - name: Build Inno Setup installer
      run: |
        $version = "${{ steps.version.outputs.VERSION }}"
        $installer = "dist\Dienstplan-Windows-Setup-v${version}.exe"
        iscc /DMyAppVersion=$version installer\Dienstplan.iss
        echo "INSTALLER_NAME=Dienstplan-Windows-Setup-v${version}.exe" >> $env:GITHUB_OUTPUT
      id: installerstep

    - name: Upload Windows ZIP artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-zip
        path: Dienstplan-Windows-v${{ steps.version.outputs.VERSION }}.zip

    - name: Upload Windows installer artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-installer
        path: dist\Dienstplan-Windows-Setup-v${{ steps.version.outputs.VERSION }}.exe

  build-python-linux-empty:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Test Python modules
      run: |
        python -c "import importlib.metadata; print('OR-Tools:', importlib.metadata.version('ortools'))"
        python -c "import importlib.metadata; print('FastAPI:', importlib.metadata.version('fastapi'))"
        python -c "import importlib.metadata; print('Uvicorn:', importlib.metadata.version('uvicorn'))"
    
    - name: Get version
      id: version
      run: |
        VERSION="2.1.${{ github.run_number }}"
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "Building version $VERSION (Production - Empty Database)"
    
    - name: Build Linux One-Dir distribution with PyInstaller
      run: |
        python -m PyInstaller Dienstplan.spec

    - name: Create distribution tar.gz
      run: |
        TAR="Dienstplan-Linux-v${{ steps.version.outputs.VERSION }}.tar.gz"
        if [ ! -d "dist/Dienstplan" ]; then
          echo "ERROR: dist/Dienstplan directory not found"
          exit 1
        fi
        tar -czf "$TAR" -C dist/Dienstplan/ .
        echo "TAR_NAME=$TAR" >> $GITHUB_OUTPUT
      id: tarstep

    - name: Upload Linux artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-tarball
        path: Dienstplan-Linux-v${{ steps.version.outputs.VERSION }}.tar.gz

  create-release:
    needs: [build-python-windows-empty, build-python-linux-empty]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Get version
      id: version
      run: |
        VERSION="2.1.${{ github.run_number }}"
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "Building version $VERSION"
    
    - name: Download Windows ZIP
      uses: actions/download-artifact@v4
      with:
        name: windows-zip

    - name: Download Windows installer
      uses: actions/download-artifact@v4
      with:
        name: windows-installer

    - name: Download Linux tarball
      uses: actions/download-artifact@v4
      with:
        name: linux-tarball
    
    - name: Generate changelog
      id: changelog
      run: |
        echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
        echo "## Changes in this release" >> $GITHUB_OUTPUT
        echo "" >> $GITHUB_OUTPUT
        git log --pretty=format:"- %s (%h)" -10 >> $GITHUB_OUTPUT || echo "- Initial release" >> $GITHUB_OUTPUT
        echo "" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.version.outputs.VERSION }}
        name: Release v${{ steps.version.outputs.VERSION }}
        body: |
          # Dienstplan Release v${{ steps.version.outputs.VERSION }}
          
          **Version 2.1 - Python Edition - Production Release**
          
          ## 📦 Downloads
          
          Download the package for your platform:

          ### Windows
          | Datei | Beschreibung |
          |-------|--------------|
          | **Dienstplan-Windows-Setup-v${{ steps.version.outputs.VERSION }}.exe** | Empfohlen – Inno-Setup-Installer (installiert in Programme, Startmenü-Eintrag) |
          | **Dienstplan-Windows-v${{ steps.version.outputs.VERSION }}.zip** | Portabel – ZIP entpacken und `Dienstplan.exe` starten |

          ### Linux
          | Datei | Beschreibung |
          |-------|--------------|
          | **Dienstplan-Linux-v${{ steps.version.outputs.VERSION }}.tar.gz** | tar.gz entpacken und `Dienstplan` starten |

          ## ✨ What's New

          - ✅ **One-Dir build**: DLLs liegen als lose Dateien neben `Dienstplan.exe` – kein Entpacken beim Start mehr
          - ✅ **Schnellerer Start**: Kein temporäres Extrahieren nach `%TEMP%` wie beim alten Monolith
          - ✅ **Inno-Setup-Installer**: Installiert das Programm sauber in Programme, legt Startmenü- und Desktop-Verknüpfung an
          - ✅ **Portable ZIP**: Alternativ einfach entpacken und ausführen
          - ✅ **Keine Python-Installation nötig**: Alles mitgeliefert
          - ✅ **Datenbank wird automatisch angelegt**: Beim ersten Start leer, für den Produktiveinsatz bereit
          
          ## 🚀 Quick Start

          ### Windows (Installer)
          1. `Dienstplan-Windows-Setup-v${{ steps.version.outputs.VERSION }}.exe` herunterladen und ausführen
          2. Installationsassistent folgen
          3. Dienstplan über Startmenü oder Desktop-Verknüpfung starten
          4. Browser öffnet sich automatisch auf http://localhost:5000

          ### Windows (Portable ZIP)
          1. `Dienstplan-Windows-v${{ steps.version.outputs.VERSION }}.zip` herunterladen und entpacken
          2. `Dienstplan.exe` doppelklicken
          3. Browser öffnet sich automatisch auf http://localhost:5000

          ### Linux
          ```bash
          tar -xzf Dienstplan-Linux-v${{ steps.version.outputs.VERSION }}.tar.gz
          chmod +x Dienstplan
          ./Dienstplan
          ```
          
          ## 🔐 Standard-Zugangsdaten
          
          - **E-Mail**: admin@fritzwinter.de
          - **Passwort**: Admin123!
          - ⚠️ **Bitte nach dem ersten Login das Passwort ändern!**
          
          ## 📝 Datenbankpfad
          
          - `data\dienstplan.db` im selben Verzeichnis wie `Dienstplan.exe`
          - Wird automatisch beim ersten Start angelegt
          - Für Backups: diese Datei regelmäßig kopieren
          
          ## 🛠️ Technische Details
          
          - **Web-Server**: Uvicorn (ASGI, produktionsreif)
          - **Solver**: Google OR-Tools CP-SAT
          - **Datenbank**: SQLite (automatisch initialisiert)
          - **Build**: PyInstaller One-Dir + Inno Setup Installer
          
          ${{ steps.changelog.outputs.CHANGELOG }}
        files: |
          Dienstplan-Windows-v${{ steps.version.outputs.VERSION }}.zip
          Dienstplan-Windows-Setup-v${{ steps.version.outputs.VERSION }}.exe
          Dienstplan-Linux-v${{ steps.version.outputs.VERSION }}.tar.gz
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
