name: Build, Test and Release

on:
  workflow_dispatch:

jobs:
  build-python-windows-empty:
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
    
    - name: Test Python modules
      run: |
        python -c "import importlib.metadata; print('OR-Tools:', importlib.metadata.version('ortools'))"
        python -c "import importlib.metadata; print('FastAPI:', importlib.metadata.version('fastapi'))"
        python -c "import importlib.metadata; print('Uvicorn:', importlib.metadata.version('uvicorn'))"
    
    - name: Run automated test suite (no slow solver)
      run: |
        python -m pytest -m "not slow" tests/ --tb=short -q
    
    - name: Get version
      id: version
      run: |
        $VERSION = "2.2.${{ github.run_number }}"
        echo "VERSION=$VERSION" >> $env:GITHUB_OUTPUT
        echo "Building version $VERSION (Production - Empty Database)"
    
    - name: Build Windows One-Dir distribution with PyInstaller
      run: |
        python -m PyInstaller Dienstplan.spec

    - name: Check signing configuration
      id: signing
      shell: pwsh
      run: |
        $hasCert = -not [string]::IsNullOrWhiteSpace("${{ secrets.WINDOWS_SIGN_CERT_BASE64 }}")
        $hasPassword = -not [string]::IsNullOrWhiteSpace("${{ secrets.WINDOWS_SIGN_CERT_PASSWORD }}")
        if ($hasCert -and $hasPassword) {
          "enabled=true" >> $env:GITHUB_OUTPUT
          Write-Host "Code signing is enabled."
        } else {
          "enabled=false" >> $env:GITHUB_OUTPUT
          Write-Host "Code signing secrets missing - building unsigned artifacts."
        }

    - name: Import code-signing certificate
      if: steps.signing.outputs.enabled == 'true'
      shell: pwsh
      run: |
        $certPath = Join-Path $env:RUNNER_TEMP "dienstplan-codesign.pfx"
        [IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String("${{ secrets.WINDOWS_SIGN_CERT_BASE64 }}"))
        "WINDOWS_SIGN_CERT_PATH=$certPath" >> $env:GITHUB_ENV

    - name: Sign app executable
      if: steps.signing.outputs.enabled == 'true'
      shell: pwsh
      run: |
        $exePath = "dist\Dienstplan\Dienstplan.exe"
        if (!(Test-Path $exePath)) {
          throw "Executable not found: $exePath"
        }
        $timestampServers = @(
          "http://timestamp.digicert.com",
          "http://timestamp.sectigo.com"
        )
        $signed = $false
        foreach ($ts in $timestampServers) {
          Write-Host "Trying timestamp server: $ts"
          & signtool sign `
            /fd SHA256 `
            /td SHA256 `
            /tr $ts `
            /f "$env:WINDOWS_SIGN_CERT_PATH" `
            /p "${{ secrets.WINDOWS_SIGN_CERT_PASSWORD }}" `
            "$exePath"
          if ($LASTEXITCODE -eq 0) {
            $signed = $true
            break
          }
        }
        if (-not $signed) {
          throw "Signing failed with all configured timestamp servers."
        }
        signtool verify /pa "$exePath"

    - name: Create distribution ZIP
      run: |
        $zip = "Dienstplan-Windows-v${{ steps.version.outputs.VERSION }}.zip"
        Compress-Archive -Path "dist\Dienstplan\*" -DestinationPath $zip -Force
        echo "ZIP_NAME=$zip" >> $env:GITHUB_OUTPUT
      id: zipstep

    # windows-latest can be Server 2025+, where Inno Setup is not preinstalled (ISCC not on PATH).
    - name: Install Inno Setup
      shell: pwsh
      run: |
        choco install innosetup --no-progress -y
        $dir = @(
          "${env:ProgramFiles(x86)}\Inno Setup 6",
          "${env:ProgramFiles}\Inno Setup 6"
        ) | Where-Object { Test-Path (Join-Path $_ "ISCC.exe") } | Select-Object -First 1
        if (-not $dir) { throw "ISCC.exe not found after choco install innosetup" }
        Add-Content -Path $env:GITHUB_PATH -Value $dir

    - name: Build Inno Setup installer
      shell: pwsh
      run: |
        $version = "${{ steps.version.outputs.VERSION }}"
        iscc /DMyAppVersion=$version installer\Dienstplan.iss
        "INSTALLER_NAME=Dienstplan-Windows-Setup-v${version}.exe" >> $env:GITHUB_OUTPUT
      id: installerstep

    - name: Sign installer executable
      if: steps.signing.outputs.enabled == 'true'
      shell: pwsh
      run: |
        $installerPath = "dist\Dienstplan-Windows-Setup-v${{ steps.version.outputs.VERSION }}.exe"
        if (!(Test-Path $installerPath)) {
          throw "Installer not found: $installerPath"
        }
        $timestampServers = @(
          "http://timestamp.digicert.com",
          "http://timestamp.sectigo.com"
        )
        $signed = $false
        foreach ($ts in $timestampServers) {
          Write-Host "Trying timestamp server: $ts"
          & signtool sign `
            /fd SHA256 `
            /td SHA256 `
            /tr $ts `
            /f "$env:WINDOWS_SIGN_CERT_PATH" `
            /p "${{ secrets.WINDOWS_SIGN_CERT_PASSWORD }}" `
            "$installerPath"
          if ($LASTEXITCODE -eq 0) {
            $signed = $true
            break
          }
        }
        if (-not $signed) {
          throw "Signing failed with all configured timestamp servers."
        }
        signtool verify /pa "$installerPath"

    - name: Upload Windows ZIP artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-zip
        path: Dienstplan-Windows-v${{ steps.version.outputs.VERSION }}.zip

    - name: Upload Windows installer artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-installer
        path: dist\Dienstplan-Windows-Setup-v${{ steps.version.outputs.VERSION }}.exe

  build-python-linux-empty:
    # Build on Ubuntu 22.04 to keep glibc requirements compatible with
    # older target systems. ubuntu-latest may pull in newer glibc symbols
    # (e.g. GLIBC_2.38) that break startup on customer machines.
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        sudo apt-get update
        sudo apt-get install -y rpm
    
    - name: Test Python modules
      run: |
        python -c "import importlib.metadata; print('OR-Tools:', importlib.metadata.version('ortools'))"
        python -c "import importlib.metadata; print('FastAPI:', importlib.metadata.version('fastapi'))"
        python -c "import importlib.metadata; print('Uvicorn:', importlib.metadata.version('uvicorn'))"
    
    - name: Run automated test suite (no slow solver)
      run: |
        python -m pytest -m "not slow" tests/ --tb=short -q
    
    - name: Get version
      id: version
      run: |
        VERSION="2.2.${{ github.run_number }}"
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "Building version $VERSION (Production - Empty Database)"
    
    - name: Build Linux One-Dir distribution with PyInstaller
      run: |
        python -m PyInstaller Dienstplan.spec

    - name: Create distribution tar.gz
      run: |
        TAR="Dienstplan-Linux-v${{ steps.version.outputs.VERSION }}.tar.gz"
        SOURCE_DIR=""
        if [ -d "dist/Dienstplan" ]; then
          SOURCE_DIR="dist/Dienstplan"
        elif [ -d "dist/Dienstplan_bundle" ]; then
          SOURCE_DIR="dist/Dienstplan_bundle"
        else
          echo "ERROR: Neither dist/Dienstplan nor dist/Dienstplan_bundle directory found"
          exit 1
        fi
        if [ "$SOURCE_DIR" != "dist/Dienstplan" ]; then
          rm -rf dist/Dienstplan
          cp -a "$SOURCE_DIR" dist/Dienstplan
        fi
        # Write a VERSION file so users can always check which build they have
        echo "${{ steps.version.outputs.VERSION }}" > dist/Dienstplan/VERSION
        # Package with a top-level Dienstplan/ folder so extracting to any
        # directory is safe and the contents don't spill into the current dir
        tar -czf "$TAR" -C dist Dienstplan
        echo "TAR_NAME=$TAR" >> $GITHUB_OUTPUT
      id: tarstep

    - name: Build Linux .deb/.rpm packages
      run: |
        chmod +x build_linux_packages.sh
        ./build_linux_packages.sh "${{ steps.version.outputs.VERSION }}"

    - name: Upload Linux deb artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-deb
        path: dist/packages/*.deb

    - name: Upload Linux rpm artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-rpm
        path: dist/packages/*.rpm

    - name: Upload Linux artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-tarball
        path: Dienstplan-Linux-v${{ steps.version.outputs.VERSION }}.tar.gz

  create-release:
    needs: [build-python-windows-empty, build-python-linux-empty]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Get version
      id: version
      run: |
        VERSION="2.2.${{ github.run_number }}"
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
        echo "Building version $VERSION"
    
    - name: Download Windows ZIP
      uses: actions/download-artifact@v4
      with:
        name: windows-zip

    - name: Download Windows installer
      uses: actions/download-artifact@v4
      with:
        name: windows-installer

    - name: Download Linux tarball
      uses: actions/download-artifact@v4
      with:
        name: linux-tarball

    - name: Download Linux deb package
      uses: actions/download-artifact@v4
      with:
        name: linux-deb

    - name: Download Linux rpm package
      uses: actions/download-artifact@v4
      with:
        name: linux-rpm
    
    - name: Generate changelog
      id: changelog
      run: |
        echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
        echo "## Changes in this release" >> $GITHUB_OUTPUT
        echo "" >> $GITHUB_OUTPUT
        git log --pretty=format:"- %s (%h)" -10 >> $GITHUB_OUTPUT || echo "- Initial release" >> $GITHUB_OUTPUT
        echo "" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.version.outputs.VERSION }}
        name: Release v${{ steps.version.outputs.VERSION }}
        body: |
          # Dienstplan Release v${{ steps.version.outputs.VERSION }}
          
          **Version 2.2 - Python Edition - Production Release**
          
          ## 📦 Downloads
          
          Download the package for your platform:

          ### Windows
          | Datei | Beschreibung |
          |-------|--------------|
          | **Dienstplan-Windows-Setup-v${{ steps.version.outputs.VERSION }}.exe** | Empfohlen – Inno-Setup-Installer (installiert in Programme, Startmenü-Eintrag) |
          | **Dienstplan-Windows-v${{ steps.version.outputs.VERSION }}.zip** | Portabel – ZIP entpacken und `Dienstplan.exe` starten |

          ### Linux
          | Datei | Beschreibung |
          |-------|--------------|
          | **Dienstplan-Linux-v${{ steps.version.outputs.VERSION }}.tar.gz** | tar.gz entpacken und `Dienstplan` starten |
          | **dienstplan_${{ steps.version.outputs.VERSION }}_amd64.deb** | Debian/Ubuntu Paket inkl. Installer-Skripte |
          | **dienstplan-${{ steps.version.outputs.VERSION }}-1*.rpm** | RPM Paket für RHEL/Fedora/SUSE inkl. Installer-Skripte |

          ## ✨ What's New

          - ✅ **One-Dir build**: DLLs liegen als lose Dateien neben `Dienstplan.exe` – kein Entpacken beim Start mehr
          - ✅ **Schnellerer Start**: Kein temporäres Extrahieren nach `%TEMP%` wie beim alten Monolith
          - ✅ **Inno-Setup-Installer**: Installiert das Programm sauber in Programme, legt Startmenü- und Desktop-Verknüpfung an
          - ✅ **Portable ZIP**: Alternativ einfach entpacken und ausführen
          - ✅ **Linux tar.gz mit Top-Level-Ordner**: Entpacken landet sauber in `Dienstplan/` – kein Verschmutzen des aktuellen Verzeichnisses
          - ✅ **VERSION-Datei im Linux-Paket**: `cat Dienstplan/VERSION` zeigt die genaue Build-Version
          - ✅ **Keine Python-Installation nötig**: Alles mitgeliefert
          - ✅ **Datenbank wird automatisch angelegt**: Beim ersten Start leer, für den Produktiveinsatz bereit
          
          ## 🚀 Quick Start

          ### Windows (Installer)
          1. `Dienstplan-Windows-Setup-v${{ steps.version.outputs.VERSION }}.exe` herunterladen und ausführen
          2. Installationsassistent folgen
          3. Dienstplan über Startmenü oder Desktop-Verknüpfung starten
          4. Browser öffnet sich automatisch auf http://localhost:5000

          ### Windows (Portable ZIP)
          1. `Dienstplan-Windows-v${{ steps.version.outputs.VERSION }}.zip` herunterladen und entpacken
          2. `Dienstplan.exe` doppelklicken
          3. Browser öffnet sich automatisch auf http://localhost:5000

          ### Linux
          ```bash
          tar -xzf Dienstplan-Linux-v${{ steps.version.outputs.VERSION }}.tar.gz
          cd Dienstplan
          chmod +x Dienstplan
          ./Dienstplan
          ```

          Paketinstallation:
          ```bash
          # Debian/Ubuntu
          sudo dpkg -i dienstplan_${{ steps.version.outputs.VERSION }}_amd64.deb
          
          # RHEL/Fedora/SUSE
          sudo rpm -Uvh dienstplan-${{ steps.version.outputs.VERSION }}-1.x86_64.rpm
          ```
          
          ## 🔐 Initiale Zugangsdaten
          
          - **E-Mail**: über `DIENSTPLAN_INITIAL_ADMIN_EMAIL` (Fallback: `admin@fritzwinter.de`)
          - **Passwort**: über `DIENSTPLAN_INITIAL_ADMIN_PASSWORD` oder beim ersten Start automatisch generiert
          - ⚠️ **Bitte das Initialpasswort nach dem ersten Login ändern!**
          
          ## 📝 Datenbankpfad
          
          - Windows: `%LOCALAPPDATA%\Dienstplan\data\dienstplan.db`
          - Wird automatisch beim ersten Start angelegt
          - Für Backups: diese Datei regelmäßig kopieren
          
          ## 🛠️ Technische Details
          
          - **Web-Server**: Uvicorn (ASGI, produktionsreif)
          - **Solver**: Google OR-Tools CP-SAT
          - **Datenbank**: SQLite (automatisch initialisiert)
          - **Build**: PyInstaller One-Dir + Inno Setup Installer
          
          ${{ steps.changelog.outputs.CHANGELOG }}
        files: |
          Dienstplan-Windows-v${{ steps.version.outputs.VERSION }}.zip
          Dienstplan-Windows-Setup-v${{ steps.version.outputs.VERSION }}.exe
          Dienstplan-Linux-v${{ steps.version.outputs.VERSION }}.tar.gz
          dienstplan_${{ steps.version.outputs.VERSION }}_amd64.deb
          dienstplan-${{ steps.version.outputs.VERSION }}-1*.x86_64.rpm
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
