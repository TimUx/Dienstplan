# Alembic configuration file for Dienstplan database migrations
# https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# path to migration scripts, relative to this file
script_location = migrations

# SQLite database URL
# Override via DIENSTPLAN_DB_URL environment variable or set programmatically
sqlalchemy.url = sqlite:///dienstplan.db

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
