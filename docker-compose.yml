# Dienstplan - Docker Compose Configuration
# Automatisches Schichtverwaltungssystem

services:
  dienstplan:
    build: .
    image: dienstplan:latest
    container_name: dienstplan
    ports:
      - "5000:5000"
    volumes:
      # Persistent database storage - data survives container restarts
      - dienstplan-data:/data
    environment:
      - DB_PATH=/data/dienstplan.db
      - HOST=0.0.0.0
      - PORT=5000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  dienstplan-data:
    driver: local
