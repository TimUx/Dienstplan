[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
pythonpath = .
markers =
    slow: marks tests as slow (solver tests, may take up to 300s each)
    api: marks tests as API tests
    unit: marks tests as unit tests
    integration: marks tests as integration tests
    e2e: marks tests as multi-step user-flow / HTTP chain tests (no OR-Tools unless also slow)
addopts = -v --tb=short
# timeout = 0  # no global timeout – solver tests may run as long as needed
