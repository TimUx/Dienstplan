            <!-- Statistics View -->
            <div id="statistics-view" class="view">
                <h2>📊 Statistiken</h2>

                    <div class="date-range">
                        <label>Von: <input type="date" id="statsStartDate"></label>
                        <label>Bis: <input type="date" id="statsEndDate"></label>
                        <button data-action="loadStatistics" class="btn-primary">🔄 Aktualisieren</button>
                    </div>

                </div>
            </div>

            <div id="planning-report-view" class="view">
                <h2>📝 Planungsbericht</h2>

                    <div class="date-range">
                        <label>Jahr: <input type="number" id="reportYear" min="2020" max="2099" style="width:80px;"></label>
